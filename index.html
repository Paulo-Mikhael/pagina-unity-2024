<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/unity-icon.svg">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Buy & Download Unity Pro | Unity</title>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-text">
                <img id="unity-icon" src="images/unity-icon.svg" alt="unity-icon.svg">
                <h2>Games</h2>
                <h2>Film</h2>
                <h2>Industry</h2>
                <h2>Community</h2>
                <h2>Resources</h2>
                <h2>Learn</h2>
            </div>
            <div class="header-buttons">
                <button id="btn-price">PLANS AND PRICING <i class="fa-solid fa-arrow-right"></i></button>
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-solid fa-bars"></i>
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>
    <main>
        <div class="main-content">
            <div class="main-content-text">
                <div class="title">
                    <h1>Get started on Unity <br>Pro today</h1>
                </div>
                <div class="subtitle">
                    <h3>Put our ecosystem of game creation tools, support, and community in your team’s hands.</h3>
                </div>
                <div class="content-button">
                    <button>Download Unity Pro</button>
                </div>
            </div>
        </div>
    </main>
    <section class="examples">
        <div class="examples-content">
            <div class="examples-text">
                <h3>Just a few of games created with <br>Unity Pro</h3>
            </div>
            <div class="examples-games">
                <img src="images/Hardspace-Shipbreaker_0.png" alt="">
                <img src="images/Cuphead.png" alt="">
                <img src="images/Ori_0.png" alt="">
                <img src="images/Legends-of-Runeterra.png" alt="">
                <img src="images/DesperadosIII.png" alt="">
            </div>
        </div>
    </section>
    <script src="javascript/script.js"></script>
</body>
</html>
